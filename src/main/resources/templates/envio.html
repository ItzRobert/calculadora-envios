<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Calculadora de Envío</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h3 class="text-center mb-4">Calculadora de Envío</h3>

        <form th:action="@{/envio/calcular}" th:object="${envioForm}" method="post">

            <div class="mb-3">
                <label>Peso (kg)</label>
                <input type="number" step="0.01" class="form-control" th:field="*{peso}">
            </div>

            <div class="mb-3">
                <label>País</label>
                <select class="form-select" th:field="*{pais}">
                    <option value="">Seleccione</option>
                    <option value="INDIA">India</option>
                    <option value="US">Estados Unidos</option>
                    <option value="UK">Reino Unido</option>
                </select>
            </div>

            <button class="btn btn-primary w-100">Calcular</button>

        </form>

        <div th:if="${envioForm.error}" class="alert alert-danger mt-3"
             th:text="${envioForm.error}"></div>

        <div th:if="${envioForm.costo}" class="alert alert-success mt-3">
            Costo: <span th:text="${envioForm.costo}"></span> USD
        </div>

    </div>
</div>

</body>
</html>
